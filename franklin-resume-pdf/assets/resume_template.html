<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{DOCUMENT_TITLE}}</title>
  <style>
{{CSS}}
  </style>
</head>
<body class="{{DENSITY_CLASS}}">
  <svg aria-hidden="true" class="svg-symbols" width="0" height="0" focusable="false">
    <symbol id="icon-email" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M4.5 7.3 12 13l7.5-5.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-phone" viewBox="0 0 24 24">
      <path d="M7.1 4.2 9.6 3l3 5.1-2 1.5c.9 1.8 2.1 3.1 3.9 4l1.5-2.1 5 3-1.1 2.6c-.5 1.1-1.7 1.7-2.9 1.4-5.7-1.4-9.7-5.4-11.1-11.2-.3-1.2.2-2.4 1.2-3.1z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-location" viewBox="0 0 24 24">
      <path d="M12 21s7-6.2 7-11.7A7 7 0 0 0 5 9.3C5 14.8 12 21 12 21z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="12" cy="9.4" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
    </symbol>
    <symbol id="icon-linkedin" viewBox="0 0 24 24">
      <rect x="3.5" y="3.5" width="17" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.7"/>
      <path d="M8 10v6.3M8 7.6v.1M11.3 16.3v-6.1M11.3 12.7c.6-1.6 3.7-2.2 4.6.1.2.5.2 1.1.2 1.8v1.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </svg>

  <main class="page" id="resume-page">
    <header class="resume-header">
      <h1>{{NAME}}</h1>
      <div class="contact-row">
{{CONTACTS}}
      </div>
    </header>

    <section class="resume-section" data-section-key="summary">
      <h2><span>Professional Summary</span></h2>
      <p class="summary-text">{{SUMMARY}}</p>
    </section>

    <section class="resume-section" data-section-key="experience">
      <h2><span>Professional Experience</span></h2>
{{EXPERIENCE}}
    </section>

    <section class="resume-section" data-section-key="education">
      <h2><span>Education</span></h2>
{{EDUCATION}}
    </section>

    <section class="resume-section" data-section-key="skills">
      <h2><span>Languages &amp; Skills</span></h2>
      <p class="skills-line"><strong>Languages:</strong> {{LANGUAGES}}</p>
      <p class="skills-line"><strong>Skills:</strong> {{SKILLS}}</p>
    </section>
  </main>
</body>
</html>
